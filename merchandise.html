<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merchandise — Bumdee Comics</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Oswald:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0dc;
    --dark: #1a1a1a;
    --red: #cc2200;
    --yellow: #f5c800;
    --blue: #1a6ab5;
    --border: #333;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
  }

  /* ===== NAV ===== */
  nav {
    display: flex;
    align-items: stretch;
    background: var(--cream);
    border-bottom: 3px solid var(--border);
    padding: 12px 20px;
    gap: 20px;
  }

  .logo-badge {
    position: relative;
    width: 100px;
    height: 100px;
    flex-shrink: 0;
    mix-blend-mode: multiply;
  }

  .nav-links {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    border-left: 3px solid var(--border);
    padding-left: 16px;
    margin-left: 10px;
  }

  .nav-links a {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-decoration: none;
    color: var(--dark);
    text-transform: uppercase;
    transition: color 0.2s;
  }

  .nav-links a:hover, .nav-links a.active {
    color: var(--red);
    text-decoration: underline;
  }

  /* ===== SHOP HEADER ===== */
  .shop-header {
    background: var(--cream);
    padding: 30px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .shop-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent 0,
      transparent 10px,
      rgba(255,255,255,0.05) 10px,
      rgba(255,255,255,0.05) 20px
    );
  }

  .sunburst {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 200%;
    height: 200%;
    opacity: 0.15;
    background: repeating-conic-gradient(var(--yellow) 0deg 10deg, transparent 10deg 20deg);
  }

  .shop-banner {
    display: inline-block;
    position: relative;
    z-index: 1;
  }

  .shop-banner h1 {
    font-family: 'Bangers', cursive;
    font-size: 68px;
    letter-spacing: 4px;
    color: var(--yellow);
    -webkit-text-stroke: 3px var(--dark);
    text-shadow: 4px 4px 0 var(--dark);
    line-height: 0.9;
  }

  .shop-banner .sub {
    font-family: 'Bangers', cursive;
    font-size: 40px;
    letter-spacing: 3px;
    color: white;
    -webkit-text-stroke: 2px var(--dark);
    text-shadow: 3px 3px 0 var(--dark);
  }

  /* ===== SHOP CONTENT ===== */
  .shop-content {
    max-width: 960px;
    margin: 0 auto;
    padding: 30px 20px;
  }

  /* ===== PRODUCT GRID ===== */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }

  .product-card {
    background: white;
    border: 2px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }

  .product-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.15);
  }

  .product-img {
    width: 100%;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background: #c8b89a;
  }

  .product-img img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .product-img.bg-dark { background: #2a2a2a; }

  .badge-limited {
    position: absolute;
    top: 6px;
    left: 6px;
    background: var(--red);
    color: white;
    font-family: 'Bangers', cursive;
    font-size: 9px;
    padding: 2px 5px;
    letter-spacing: 0.5px;
    border: 1px solid var(--dark);
    border-radius: 2px;
    z-index: 2;
  }

  .product-info {
    padding: 8px 10px;
    border-top: 2px solid var(--border);
  }

  .product-info .name {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }

  .product-info .price {
    font-size: 12px;
    font-weight: 700;
    color: var(--red);
  }

  /* ===== LOADING / ERROR STATES ===== */
  .status-msg {
    grid-column: 1 / -1;
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    padding: 40px 20px;
    text-align: center;
    color: #666;
  }

  .status-msg.error { color: var(--red); }

  /* ===== FOOTER ===== */
  footer {
    background: var(--dark);
    color: var(--cream);
    text-align: center;
    padding: 14px;
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 40px;
    border-top: 4px solid var(--yellow);
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 700px) {
    .product-grid { grid-template-columns: repeat(2, 1fr); }
    .shop-banner h1 { font-size: 44px; }
  }
</style>
</head>
<body>

<!-- ===== NAV ===== -->
<nav>
  <div class="logo-badge">
    <img src="imgs/logo.png" alt="Bumdee Comics Logo" style="width:100%; height:100%; object-fit:contain; mix-blend-mode:multiply;">
  </div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="merchandise.html" class="active">Merchandise</a>
    <a href="events.html">Events</a>
  </div>
</nav>

<!-- ===== HEADER ===== -->
<div class="shop-header">
  <div class="sunburst"></div>
  <div class="logo-badge" style="width:150px; height:150px; position:relative; z-index:1; margin:0 auto 16px;">
    <img src="imgs/logo.png" alt="Bumdee Comics Logo" style="width:100%;height:100%;object-fit:contain;">
  </div>
  <div class="shop-banner">
    <div class="sub">BUMDEE</div>
    <h1>MERCHANDISE</h1>
  </div>
</div>

<!-- ===== PRODUCTS ===== -->
<div class="shop-content">
  <div class="product-grid" id="product-grid">
    <p class="status-msg">Loading products...</p>
  </div>
</div>

<footer>footer &nbsp;|&nbsp; © 2024 Bumdee Comics &nbsp;|&nbsp; All Rights Reserved</footer>

<script>
  async function loadProducts() {
    const grid = document.getElementById('product-grid');

    try {
      const res = await fetch('products.json');
      if (!res.ok) throw new Error('Fetch failed');
      const products = await res.json();

      grid.innerHTML = '';

      products.forEach(item => {
        const isLimited = item.category === 'limited';

        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <div class="product-img ${isLimited ? 'bg-dark' : ''}">
            ${isLimited ? '<div class="badge-limited">LIMITED EDITION</div>' : ''}
            <img
              src="${item.image}"
              alt="${item.name}"
              onerror="this.style.opacity='0.2'"
            >
          </div>
          <div class="product-info">
            <div class="name">${item.name}</div>
            <div class="price">$${item.price}</div>
          </div>
        `;
        grid.appendChild(card);
      });

    } catch (err) {
      grid.innerHTML = `
        <p class="status-msg error">
          Could not load products.json — make sure it is in the same folder as this file
          and that you are running a local server (not opening the file directly in the browser).
        </p>`;
      console.error(err);
    }
  }

  loadProducts();
</script>

</body>
</html>
