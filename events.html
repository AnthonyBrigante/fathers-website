<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BumDee | Events</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="side-nav">
        <a href="index.html">Home</a>
        <a href="merchandise.html">Merchandise</a>
        <a href="events.html">Events</a>
    </nav>
    <main>
        <header><img src="logo.png" class="logo-img"></header>
        <h1>Upcoming Shows</h1>
        <div style="width: 100%; height: 400px; border: 4px solid black; border-radius: 20px; overflow: hidden; margin-bottom: 30px;">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d12165.4!2d-74.3!3d40.3!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNDDCsDE4JzAwLjAiTiA3NMKwMTgnMDAuMCJX!5e0!3m2!1sen!2sus!4v123456789" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
        <div id="event-container"></div>
    </main>
    <script>
        fetch('data.json').then(res => res.json()).then(data => {
            const container = document.getElementById('event-container');
            data.events.forEach(e => {
                container.innerHTML += `
                    <div style="background:white; border:3px solid black; padding:15px; border-radius:15px; margin-bottom:15px;">
                        <h3>${e.date} - ${e.name}</h3>
                        <p>${e.details}</p>
                    </div>`;
            });
        });
    </script>
</body>
</html>
