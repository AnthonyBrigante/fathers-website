<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bumdee Comics — Events</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="events.css">
</head>
<body>

  <!-- ── NAV ───────────────────────────────────────────────── -->
  <nav class="site-nav">
    <a href="index.html" class="nav-logo">
      <img src="logo.png" alt="Bumdee Comics Logo" style="width:100%;height:100%;object-fit:contain;">
    </a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="merchandise.html">Merchandise</a>
      <a href="events.html" class="active">Events</a>
    </div>
  </nav>

  <!-- ── PAGE HEADER ───────────────────────────────────────── -->
  <header class="events-hero">
    <div class="events-hero-text">
      <h1>Events</h1>
      <p>Find us at shows near you</p>
    </div>
  </header>

  <!-- ── MAIN CONTENT ──────────────────────────────────────── -->
  <main class="events-wrap">

    <!-- LEFT: MAP ───────────────────────────────────────────── -->
    <section class="map-section">
      <h2>Our Location</h2>

      <div class="map-frame">

        <!-- Live OpenStreetMap embed (no API key needed) -->
        <iframe
          id="mapFrame"
          title="Event Location Map"
          allowfullscreen
          loading="lazy"
        ></iframe>

        <!-- Static fallback if iframe is blocked -->
        <div class="map-static" id="mapStatic">
          <div class="map-static-inner">
            <div class="map-grid-lines"></div>
            <!-- Roads -->
            <div class="road-h" style="top:28%;"></div>
            <div class="road-h" style="top:52%;"></div>
            <div class="road-h" style="top:74%;"></div>
            <div class="road-v" style="left:22%;"></div>
            <div class="road-v" style="left:48%;"></div>
            <div class="road-v" style="left:70%;"></div>
            <!-- Pin -->
            <svg class="map-pin-svg" viewBox="0 0 36 48" xmlns="http://www.w3.org/2000/svg">
              <path d="M18 0C8.06 0 0 8.06 0 18c0 13.5 18 30 18 30S36 31.5 36 18C36 8.06 27.94 0 18 0z" fill="#cc2200"/>
              <circle cx="18" cy="18" r="8" fill="white"/>
            </svg>
            <!-- Label -->
            <div class="map-label-box">OpenStreetMap</div>
            <!-- Zoom controls -->
            <div class="map-zoom">
              <button aria-label="Zoom in">+</button>
              <button aria-label="Zoom out">−</button>
            </div>
            <div class="map-attrib">© OpenStreetMap contributors</div>
          </div>
        </div>

      </div>

      <!-- Address tag (updated by JS with first event's location) -->
      <div class="location-tag">
        <span class="pin-icon">📍</span>
        <span id="mapLocationTag">Jacob K. Javits Convention Center, New York, NY</span>
      </div>
    </section>

    <!-- RIGHT: EVENTS LIST ──────────────────────────────────── -->
    <section class="events-list-section">
      <h2>Visit Us at Upcoming Shows</h2>

      <div id="eventsList">
        <!-- Event cards injected by events.js -->
      </div>

      <div class="add-event-note">
        More dates being added — check back soon!
      </div>
    </section>

  </main>

  <!-- ── FOOTER ─────────────────────────────────────────────── -->
  <footer class="site-footer">
    <span>Bumdee Comics</span> &nbsp;·&nbsp; All Rights Reserved &nbsp;·&nbsp; © 2024
  </footer>

  <script src="events.js"></script>
</body>
</html>
